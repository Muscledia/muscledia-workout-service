server:
  port: 8082 # As defined in your Service Matrix

spring:
  application:
    name: workout-service
  data:
    mongodb:
      uri: mongodb+srv://mongo:NSX2O96ElPhiLPMk@cluster0.dcypj6u.mongodb.net/muscledia_workouts?retryWrites=true&w=majority&appName=Cluster0
      database: muscledia_workouts

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka # Point to Eureka Server

management:
  endpoints:
    web:
      exposure:
        include: health # Expose the health endpoint for Eureka and monitoring

# SpringDoc OpenAPI Configuration
springdoc:
  api-docs:
    path: /api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operations-sorter: method
    tags-sorter: alpha
    try-it-out-enabled: true
  show-actuator: false
  group-configs:
    - group: "public-api"
      display-name: "Public API"
      paths-to-match: "/api/v1/**"
    - group: "admin-api"
      display-name: "Admin API"
      paths-to-match: "/api/admin/**"

api:
  exercise:
    url: ${EXERCISE_API_URL:https://www.exercisedb.dev/api/v1}
  hevy:
    base-url: https://api.hevyapp.com
    version: v1
    api-key: ${HEVY_API_KEY:879a3ffd-2482-4bd4-92af-b54d3b8c65f5}
    routines-page-size: 10
    routine-folders-page-size: 10
    max-routines-pages: 6
    max-routine-folders-pages: 2
