server:
  port: 8082 # As defined in your Service Matrix

spring:
  application:
    name: workout-service
  data:
    mongodb:
      uri: mongodb+srv://mongo:NSX2O96ElPhiLPMk@cluster0.dcypj6u.mongodb.net/muscledia_workouts?retryWrites=true&w=majority&appName=Cluster0
      database: muscledia_workouts

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka # Point to Eureka Server

management:
  endpoints:
    web:
      exposure:
        include: health # Expose the health endpoint for Eureka and monitoring

# SpringDoc OpenAPI Configuration
springdoc:
  api-docs:
    path: /api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operations-sorter: method
    tags-sorter: alpha
    try-it-out-enabled: true
    disable-swagger-default-url: true
    config-url: /api-docs/swagger-config
    url: /api-docs
  show-actuator: false
  group-configs:
    - group: "public-api"
      display-name: "Public API"
      paths-to-match: "/api/v1/**"
    - group: "admin-api"
      display-name: "Admin API"
      paths-to-match: "/api/admin/**"

api:
  exercise:
    url: ${EXERCISE_API_URL:https://www.exercisedb.dev/api/v1}
  hevy:
    base-url: https://api.hevyapp.com
    version: v1
    api-key: ${HEVY_API_KEY:879a3ffd-2482-4bd4-92af-b54d3b8c65f5}
    routines-page-size: 10
    routine-folders-page-size: 10
    max-routines-pages: 6
    max-routine-folders-pages: 2

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:1e5bf199c6450231fdd242f60485d0caadc32aa27a0d89da7174aed38326a879}
  expiration: ${JWT_EXPIRATION:86400000} # 24 hours in milliseconds
  issuer: ${JWT_ISSUER:muscledia-user-service}

# User Service Configuration (for JWT validation)
user-service:
  url: ${USER_SERVICE_URL:http://localhost:8081}
  validate-token-endpoint: ${USER_SERVICE_VALIDATE_ENDPOINT:/api/v1/auth/validate}

# Security Configuration
security:
  public-endpoints:
    - /api/v1/exercises/**
    - /api/v1/muscle-groups/**
    - /api/v1/auth/test
    - /api-docs/**
    - /swagger-ui/**
    - /swagger-ui.html
    - /actuator/health
    - /webjars/**
  admin-endpoints:
    - /api/admin/**
